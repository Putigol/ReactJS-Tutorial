<!doctype html>
<html>
  <head>
    <title>Basic Chatbot</title>
  </head>
  <body>
    <!-- Nơi React render nội dung -->
    <div class="js-container"></div>
    <!-- ReactJS: thư viện react cơ bản -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <!--ReactDOM: render vào DOM  -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <!-- Babel: chuyển đổi JSX sang JS -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- cho phép viết JSX -->
    <script type="text/babel">
      // Fragment <></>
      function ChatInput() {
        return (
          <>
            <input
              type="text"
              placeholder="Send a message to Chatbot"
              size="50"
            />
            <button>Send</button>
          </>
        );
      }
      function ChatMessage({ message, sender }) {
        return (
          <div>
            {sender === "bot" && (
              <img src="./img/robot.png" width="30" height="30" />
            )}
            {message}
            {sender === "user" && (
              <img src="./img/user.png" width="30" height="30" />
            )}
          </div>
        );
      }

      function ChatMessages() {
        const chatMessages = [
          {
            message: "Hello chatbot",
            sender: "user",
            id: "1",
          },
          {
            message: "How can I help you today?",
            sender: "bot",
            id: "2",
          },
          {
            message: "Can you get my today's date",
            sender: "user",
            id: "3",
          },
          {
            message: "Today is 17/06/2026",
            sender: "bot",
            id: "4",
          },
        ];
        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  //{} lưu code vào prop
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      }

      function App() {
        //Lưu data

        return (
          <>
            <ChatInput />
            <br />
            <br />
            <ChatMessages />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
