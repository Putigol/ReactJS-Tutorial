<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <!-- Nơi React render nội dung -->
    <div class="js-container"></div>
    <!-- ReactJS: thư viện react cơ bản -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <!--ReactDOM: render vào DOM  -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <!-- Babel: chuyển đổi JSX sang JS -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- cho phép viết JSX -->
    <script type="text/babel">
      // const button = document.createElement("button");
      // button.innerHTML = "Click";
      // const button = <button>Click</button>;
      // const paragraph = <p>Welcome to SuperSimpleDev React Course</p>;

      const div = (
        <div>
          <button>Click</button>
          //JSX cho phép truyền JS vào chuỗi stringHTML
          <p>Welcome to SuperSimpleDev React Course {1 + 1}</p>
        </div>
      );

      //Setup React
      // Method querySelector tìm và lưu element có class js-container
      // tạo một react root
      // render với text "Welcome to SuperSimpleDev React Course"
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(div);
    </script>
  </body>
</html>
